# --- НАСТРОЙКИ ПИТАНИЯ И ЭНЕРГОСБЕРЕЖЕНИЯ ---
# Включить режим глубокого сна (Deep Sleep) для экономии батареи
CONFIG_ZMK_SLEEP=y
# Время бездействия до перехода в режим сна (в миллисекундах) 
# 1 800 000 мс = 30 минут
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=1800000

# --- НАСТРОЙКИ BLUETOOTH ---
# Увеличить мощность передатчика Bluetooth до максимума (+8 dBm)
# Очень помогает, если клавиатура теряет связь, когда ПК находится под столом
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# --- СТАБИЛЬНОСТЬ И ИНДИКАЦИЯ ---
# Включить поддержку отображения уровня заряда батареи в ОС (Windows/macOS/Android)
CONFIG_ZMK_BATTERY_REPORTING=y
